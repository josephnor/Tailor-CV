<div *ngIf="loading" class="flex justify-center items-center min-h-screen bg-slate-50 gap-4 text-slate-500">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
    Loading your CVs...
</div>

<div *ngIf="!loading" class="min-h-screen mesh-gradient py-10 px-4 md:px-10 font-sans text-slate-900">
    <div class="max-w-[1400px] mx-auto flex flex-col gap-8">

        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div class="flex items-center gap-6">
                <img src="/logos/tailor-cv-white.png" alt="TailorCV Logo"
                    class="w-64 h-auto drop-shadow-xl hover:scale-105 transition-transform logo-screen-blend object-contain">
                <div class="flex flex-col">
                    <h2 class="text-3xl font-black tracking-tight text-white uppercase leading-none mb-1">
                        Standardize Your Future
                    </h2>
                    <p class="text-slate-400 text-xs font-bold tracking-[0.2em] uppercase opacity-60">
                        Tailored Professional Excellence
                    </p>
                </div>
            </div>
            <div class="flex gap-3">
                <button (click)="createCv()" [disabled]="creating"
                    class="bg-red-600 text-white font-bold uppercase tracking-widest px-8 py-4 rounded-xl shadow-[0_10px_30px_rgba(220,38,38,0.4)] hover:bg-red-700 hover:-translate-y-1 active:scale-95 transition-all disabled:opacity-50">
                    <span *ngIf="!creating">+ New CV</span>
                    <span *ngIf="creating">Creating...</span>
                </button>
                <button (click)="authService.logout()"
                    class="bg-slate-800/80 backdrop-blur-md text-white font-bold px-6 py-4 rounded-xl border border-white/10 hover:bg-slate-700 transition">
                    Logout
                </button>
            </div>
        </div>

        <!-- Dashboard Body: Split Layout -->
        <div class="flex flex-col lg:flex-row gap-8 min-h-[700px]">

            <!-- Sidebar: CV List (35%) -->
            <div class="w-full lg:w-[35%] flex flex-col gap-4">
                <div *ngIf="cvList.length === 0"
                    class="bg-white/10 backdrop-blur-xl rounded-2xl p-12 text-center border border-white/10">
                    <p class="text-6xl mb-4">📄</p>
                    <h2 class="text-xl font-bold text-white mb-2">No CVs yet</h2>
                    <p class="text-slate-400 mb-6">Create your first CV to get started</p>
                </div>

                <div class="flex flex-col gap-3 overflow-y-auto max-h-[115vh] pr-1 custom-scrollbar">
                    <div *ngFor="let cv of cvList" (click)="selectCv(cv.cvId)"
                        class="group rounded-xl shadow-md transition-all duration-200 cursor-pointer border relative"
                        [ngClass]="selectedCvId === cv.cvId
                           ? 'bg-white border-red-500 ring-2 ring-red-500'
                           : 'bg-white/80 border-white/30 hover:bg-white hover:border-slate-200'">

                        <!-- Red selection strip -->
                        <div *ngIf="selectedCvId === cv.cvId"
                            class="absolute left-0 top-0 bottom-0 w-1 bg-red-600 rounded-l-xl"></div>

                        <!-- Card body -->
                        <div class="px-5 pt-4 pb-3 pl-6">
                            <!-- Title row -->
                            <div class="flex items-start justify-between gap-2 mb-1.5">
                                <h3
                                    class="font-bold text-slate-900 group-hover:text-red-600 transition-colors text-sm leading-snug">
                                    {{ cv.label }}</h3>
                                <span *ngIf="cv.isDefault"
                                    class="shrink-0 text-[9px] bg-emerald-100 text-emerald-700 font-black px-2 py-0.5 rounded-full uppercase tracking-wide">★
                                    Default</span>
                            </div>

                            <!-- Template + Date row -->
                            <div class="flex items-center gap-2 mb-3">
                                <span
                                    class="text-[10px] font-bold text-red-600 bg-red-50 border border-red-100 px-2 py-0.5 rounded-full uppercase tracking-wider">{{
                                    getTemplateName(cv.template) }}</span>
                                <span class="text-[10px] text-slate-400">{{ formatDate(cv.updatedAt) }}</span>
                            </div>

                            <!-- Actions -->
                            <div class="flex items-center gap-1.5">
                                <button (click)="$event.stopPropagation(); editCv(cv.cvId)"
                                    class="text-[10px] font-bold bg-slate-800 text-white px-3 py-1.5 rounded-lg hover:bg-red-600 transition-colors">Edit</button>
                                <button (click)="$event.stopPropagation(); duplicateCv(cv.cvId, cv.label)"
                                    class="text-[10px] font-bold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-200 transition-colors">Copy</button>
                                <button *ngIf="!cv.isDefault" (click)="$event.stopPropagation(); setDefault(cv.cvId)"
                                    class="text-[10px] font-bold bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-lg hover:bg-emerald-100 transition-colors">Default</button>
                                <button (click)="$event.stopPropagation(); deleteCv(cv.cvId, cv.label)"
                                    class="text-[10px] font-bold text-slate-300 px-2 py-1.5 rounded-lg hover:bg-red-50 hover:text-red-500 transition-colors ml-auto">✕</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview Pane (65%) -->
            <div class="w-full lg:w-[65%] sticky top-8 flex flex-col h-fit h-max">
                <div
                    class="bg-white/10 backdrop-blur-xl rounded-3xl p-2 border border-white/20 shadow-2xl overflow-hidden relative min-h-[600px] flex flex-col box-preview-glow">

                    <!-- Preview Toolbar -->
                    <div
                        class="bg-white/5 backdrop-blur-xl p-4 border border-white/10 flex justify-between items-center px-8 z-10 rounded-2xl mb-4 mx-4 mt-4">
                        <div class="flex items-center gap-3">
                            <div
                                class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.6)] animate-pulse">
                            </div>
                            <span class="text-[10px] font-black uppercase tracking-[0.3em] text-white/40">Live
                                Analysis</span>
                        </div>
                        <button *ngIf="selectedCvId" (click)="viewCv(selectedCvId)"
                            class="text-[10px] font-black uppercase tracking-widest bg-white/10 text-white border border-white/20 px-6 py-2 rounded-full hover:bg-white/20 transition backdrop-blur-sm active:scale-95">
                            Full Page View
                        </button>
                    </div>

                    <!-- CV Sandbox (The Actual Preview) -->
                    <div
                        class="flex-grow bg-transparent overflow-y-auto max-h-[750px] p-6 md:p-12 custom-scrollbar flex justify-center">

                        <div *ngIf="previewLoading"
                            class="absolute inset-0 z-20 bg-slate-900/40 backdrop-blur-[2px] flex items-center justify-center">
                            <div
                                class="animate-spin rounded-full h-12 w-12 border-4 border-red-500 border-t-transparent">
                            </div>
                        </div>

                        <div *ngIf="selectedCvData"
                            class="w-full origin-top scale-[0.85] md:scale-100 transform transition-transform duration-500">
                            <!-- Dynamic Template Selection -->
                            <ng-container [ngSwitch]="selectedCvData.template || 'default'">
                                <app-cv-template-elegant *ngSwitchCase="'elegant'"
                                    [data]="selectedCvData"></app-cv-template-elegant>
                                <app-cv-template-bold *ngSwitchCase="'bold'"
                                    [data]="selectedCvData"></app-cv-template-bold>
                                <app-cv-template-clean *ngSwitchCase="'clean'"
                                    [data]="selectedCvData"></app-cv-template-clean>
                                <app-cv-template-default *ngSwitchDefault
                                    [data]="selectedCvData"></app-cv-template-default>
                            </ng-container>
                        </div>

                        <div *ngIf="!selectedCvData && !previewLoading"
                            class="flex flex-col items-center justify-center py-20 text-slate-300">
                            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                                class="mb-4 opacity-20">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                <line x1="9" y1="3" x2="9" y2="21" />
                            </svg>
                            <p class="font-bold tracking-widest uppercase text-xs">Select a CV to preview</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
