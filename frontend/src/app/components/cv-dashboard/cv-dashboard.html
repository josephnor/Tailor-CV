<div *ngIf="loading" class="flex justify-center items-center min-h-screen bg-slate-50 gap-4 text-slate-500">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
    Loading your CVs...
</div>

<div *ngIf="!loading" class="min-h-screen mesh-gradient py-10 px-4 md:px-0 font-sans text-slate-900">
    <div class="max-w-[900px] mx-auto">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white drop-shadow-lg">
                    📋 Your CV's
                </h1>
                <p class="text-slate-300 text-sm mt-1">Manage and tailor your CVs for different job offers</p>
            </div>
            <div class="flex gap-3">
                <button (click)="createCv()" [disabled]="creating"
                    class="bg-red-600 text-white font-bold uppercase tracking-widest px-6 py-3 rounded-lg shadow-lg hover:bg-red-700 hover:-translate-y-0.5 transition disabled:opacity-50">
                    <span *ngIf="!creating">+ New CV</span>
                    <span *ngIf="creating">Creating...</span>
                </button>
                <button (click)="authService.logout()"
                    class="bg-slate-700 text-white font-bold px-5 py-3 rounded-lg hover:bg-slate-600 transition">
                    Logout
                </button>
            </div>
        </div>

        <!-- Empty State -->
        <div *ngIf="cvList.length === 0" class="bg-white/90 backdrop-blur-sm rounded-2xl p-16 text-center shadow-2xl">
            <p class="text-6xl mb-4">📄</p>
            <h2 class="text-xl font-bold text-slate-800 mb-2">No CVs yet</h2>
            <p class="text-slate-500 mb-6">Create your first CV to get started</p>
            <button (click)="createCv()"
                class="bg-red-600 text-white font-bold px-8 py-3 rounded-lg hover:bg-red-700 transition">
                + Create First CV
            </button>
        </div>

        <!-- CV Cards Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div *ngFor="let cv of cvList"
                class="bg-white/95 backdrop-blur-sm rounded-2xl p-6 shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 border border-white/20 relative group">

                <!-- Default Badge -->
                <span *ngIf="cv.isDefault"
                    class="absolute top-4 right-4 bg-emerald-100 text-emerald-700 text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full">
                    ⭐ Default
                </span>

                <!-- CV Info -->
                <h3 class="text-lg font-bold text-slate-900 pr-24 mb-1">{{ cv.label }}</h3>
                <p class="text-xs text-slate-400 mb-4">
                    Updated {{ formatDate(cv.updatedAt) }} · Created {{ formatDate(cv.createdAt) }}
                </p>

                <!-- Action Buttons -->
                <div class="flex flex-wrap gap-2">
                    <button (click)="editCv(cv.cvId)"
                        class="text-xs font-bold bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition">
                        ✏️ Edit
                    </button>
                    <button (click)="viewCv(cv.cvId)"
                        class="text-xs font-bold bg-slate-100 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-200 transition">
                        👁️ View
                    </button>
                    <button (click)="duplicateCv(cv.cvId, cv.label)"
                        class="text-xs font-bold bg-blue-50 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-100 transition">
                        📋 Duplicate
                    </button>
                    <button *ngIf="!cv.isDefault" (click)="setDefault(cv.cvId)"
                        class="text-xs font-bold bg-emerald-50 text-emerald-600 px-4 py-2 rounded-lg hover:bg-emerald-100 transition">
                        ⭐ Set Default
                    </button>
                    <button (click)="deleteCv(cv.cvId, cv.label)"
                        class="text-xs font-bold bg-red-50 text-red-500 px-4 py-2 rounded-lg hover:bg-red-100 transition opacity-0 group-hover:opacity-100">
                        🗑️ Delete
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>
