<!-- SVG Sprite from cv2.html -->
<svg style="display:none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <symbol id="cv2-icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.29-2.28a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
    </symbol>
    <symbol id="cv2-icon-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2" />
        <path d="m22 7-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7" />
    </symbol>
    <symbol id="cv2-icon-mappin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z" />
        <circle cx="12" cy="10" r="3" />
    </symbol>
    <symbol id="cv2-icon-linkedin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z" />
        <rect x="2" y="9" width="4" height="12" />
        <circle cx="4" cy="4" r="2" />
    </symbol>
    <symbol id="cv2-icon-grad" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
        <path d="M6 12v5c3 3 9 3 12 0v-5" />
    </symbol>
    <symbol id="cv2-icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
    </symbol>
</svg>

<div *ngIf="loading" class="min-h-screen bg-slate-50 py-10 px-4 md:px-0">
    <div
        class="max-w-[896px] mx-auto bg-white shadow-xl rounded-2xl overflow-hidden animate-pulse flex flex-col md:flex-row min-h-[800px]">
        <!-- Skeleton Sidebar -->
        <div class="w-full md:w-1/3 bg-slate-800 p-8 flex flex-col gap-8">
            <div class="flex flex-col items-center gap-6">
                <div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-slate-700"></div>
                <div class="w-3/4 h-8 bg-slate-700 rounded mt-2"></div>
                <div class="w-1/2 h-4 bg-slate-700 rounded"></div>
            </div>
            <div class="space-y-4 mt-8">
                <div class="w-full h-4 bg-slate-700 rounded"></div>
                <div class="w-5/6 h-4 bg-slate-700 rounded"></div>
                <div class="w-4/6 h-4 bg-slate-700 rounded"></div>
            </div>
        </div>
        <!-- Skeleton Main Content -->
        <div class="w-full md:w-2/3 p-8 md:p-12 flex flex-col gap-10">
            <div class="space-y-4">
                <div class="w-1/3 h-6 bg-slate-200 rounded mb-6"></div>
                <div class="w-full h-4 bg-slate-200 rounded"></div>
                <div class="w-full h-4 bg-slate-200 rounded"></div>
                <div class="w-3/4 h-4 bg-slate-200 rounded"></div>
            </div>
            <div class="space-y-6 mt-8">
                <div class="w-1/3 h-6 bg-slate-200 rounded mb-6"></div>
                <div class="w-full h-24 bg-slate-100 rounded"></div>
                <div class="w-full h-24 bg-slate-100 rounded"></div>
            </div>
        </div>
    </div>
</div>

<div *ngIf="data"
    class="min-h-screen mesh-gradient py-10 px-4 md:px-0 font-sans text-slate-900 cv-page print:bg-white print:p-0">
    <div class="max-w-[896px] mx-auto print:max-w-full cv-card-glow">

        <!-- Premium Header -->
        <header class="text-center mb-12 animate-fade-in-up print:hidden">
            <h2 class="text-sm font-black uppercase tracking-[0.5em] text-red-600 mb-2">Interactive
                Portfolio</h2>
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter text-gradient-premium">
                CURRICULUM <span class="text-red-600">2026</span>
            </h1>
            <div class="w-24 h-1 bg-red-600 mx-auto mt-6 rounded-full shadow-[0_0_15px_rgba(220,38,38,0.5)]"></div>
        </header>

        <!-- Toolbar -->
        <div class="flex flex-wrap justify-end mb-4 print:hidden gap-3">
            <a routerLink="/dashboard"
                class="inline-flex items-center gap-2 bg-white text-slate-800 border border-slate-200 px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-slate-50 transition active:scale-95">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Dashboard
            </a>

            <ng-container *ngIf="authService.isLoggedIn && authService.currentUsername === viewingUsername">
                <a routerLink="/admin/{{data.cvId}}"
                    class="inline-flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-slate-700 transition active:scale-95">
                    Edit CV
                </a>
                <button (click)="logout()"
                    class="inline-flex items-center gap-2 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-slate-700 hover:text-white transition">
                    Logout
                </button>
            </ng-container>
            <a *ngIf="!authService.isLoggedIn" routerLink="/login"
                class="inline-flex items-center gap-2 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-slate-700 hover:text-white transition">
                Login / Create
            </a>

            <button (click)="printPdf()"
                class="inline-flex items-center gap-2 bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-red-700 transition">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Export to PDF
            </button>
        </div>

        <!-- Render Selected Template -->
        <ng-container [ngSwitch]="data.template || 'default'">
            <!-- Elegant Template -->
            <app-cv-template-elegant *ngSwitchCase="'elegant'" [data]="data"></app-cv-template-elegant>

            <!-- Bold Template -->
            <app-cv-template-bold *ngSwitchCase="'bold'" [data]="data"></app-cv-template-bold>

            <!-- Clean Template -->
            <app-cv-template-clean *ngSwitchCase="'clean'" [data]="data"></app-cv-template-clean>

            <!-- Default / Minimal Template -->
            <app-cv-template-default *ngSwitchDefault [data]="data"></app-cv-template-default>
        </ng-container>

        <!-- Footer -->
        <footer class="cv2-footer text-center text-[10px] uppercase font-bold text-slate-400 mt-6 tracking-[0.2em]">
            {{ data.profile.firstName }} {{ data.profile.lastName }} · 2026
        </footer>

    </div>
</div>
